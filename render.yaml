# Blueprint Render pour l'API centrale OpenMoney.
# https://render.com/docs/blueprint-spec
#
# Une fois ce fichier present a la racine d'un repo connecte a Render,
# Render provisionne automatiquement le service web a partir de cette spec.
#
# Les secrets (DATABASE_URL, INGEST_TOKEN) sont a definir dans le dashboard
# Render -> Service -> Environment. Ils ne doivent JAMAIS apparaitre ici.

services:
  - type: web
    name: openmoney-central
    runtime: node
    plan: free              # Free tier : dort apres 15 min d'inactivite. Upgrade en 'starter' (7$/mois) avant prod serieuse.
    region: frankfurt       # cohabite avec la Postgres Neon en eu-central-1
    repo: https://github.com/banietika068005449-commits/openmoney-central
    branch: main
    rootDir: .
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      # Render injecte automatiquement PORT, lu en priorite par src/http/server.js.
      - key: POLL_INTERVAL_MS
        value: 5000
      - key: BATCH_SIZE
        value: 50
      - key: DATABASE_URL
        sync: false         # secret -> defini manuellement dans le dashboard
      - key: INGEST_TOKEN
        sync: false         # secret -> defini manuellement dans le dashboard
      - key: ADMIN_TOKEN
        sync: false         # secret -> jeton bootstrap dashboard
      - key: ADMIN_SESSION_TTL_HOURS
        value: 24
      - key: RECAPTCHA_SITE_KEY
        sync: false         # secret -> cle site Google reCAPTCHA v2
      - key: RECAPTCHA_SECRET_KEY
        sync: false         # secret -> cle secrete Google reCAPTCHA v2
      - key: RECAPTCHA_TIMEOUT_MS
        value: 4000
      - key: LOGIN_RATE_LIMIT_MAX
        value: 10
